# This file is generated by scripts/generate-deploy-config.mjs.
# Edit src/config/deploy-services.json and rerun the generator instead.
name: Deploy a service

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment'
        required: true
        default: staging
        options:
          - staging
          - prod
      service:
        type: choice
        description: 'Service'
        required: true
        default: api
        options:
          - api
          - aggregatedActivityLoop
          - attachmentsOrchestrator
          - attachmentsProcessor
          - artCurationNftWatchLoop
          - cloudwatchAlarmsToDiscordLoop
          - claimsBuilder
          - claimsMediaArweaveUploader
          - customReplayLoop
          - dbDumpsDaily
          - dbMigrationsLoop
          - delegationsLoop
          - discoverEnsLoop
          - dropMediaIngestStorage
          - dropMediaSanitizer
          - dropVideoConversionInvokerLoop
          - ethPriceLoop
          - externalCollectionLiveTailingLoop
          - externalCollectionSnapshottingLoop
          - helpBotReplyLoop
          - marketStatsLoop
          - mediaResizerLoop
          - mintAnnouncementsLoop
          - nextgenContractLoop
          - nextgenMediaImageResolutions
          - nextgenMediaProxyInterceptor
          - nextgenMediaUploader
          - nextgenMetadataLoop
          - nftHistoryLoop
          - nftLinkRefresherLoop
          - nftLinkMediaPreviewLoop
          - nftOwnersLoop
          - nftsLoop
          - overRatesRevocationLoop
          - ownersBalancesLoop
          - populateHistoricConsolidatedTdh
          - pushNotificationsHandler
          - rateEventProcessingLoop
          - releaseBus
          - releaseNotesGenerationLoop
          - refreshEnsLoop
          - rememesLoop
          - royaltiesLoop
          - s3Uploader
          - subscriptionsDaily
          - subscriptionsTopUpLoop
          - xTdhGrantsReviewerLoop
          - tdhHistoryLoop
          - tdhLoop
          - teamLoop
          - transactionsLoop
          - transactionsProcessingLoop
          - waveDecisionExecutionLoop
          - waveLeaderboardSnapshotterLoop
          - waveDropMetricsRefreshLoop
          - waveScoreRefreshLoop
          - xTdhLoop
      release_pull_request:
        type: string
        description: 'Merged PR represented by this production release'
        required: false
      release_note_publish:
        type: boolean
        description: 'Publish the accumulated release note for this PR after success'
        required: false
        default: false
      release_group_services:
        type: string
        description: 'Comma-separated services in this Release Bus release group'
        required: false
      release_note_groups:
        type: string
        description: 'Release Bus v2 JSON array of per-PR release-note groups'
        required: false
      release_note_opt_out:
        type: boolean
        description: 'Explicitly skip autonomous release notes for an internal operation'
        required: false
        default: false
      release_train_id:
        type: string
        description: 'Release Bus train id; blank for manual deploys'
        required: false
      release_train_revision:
        type: string
        description: 'Release Bus train revision; blank for manual deploys'
        required: false
      operation_key:
        type: string
        description: 'Release Bus idempotency key; blank for manual deploys'
        required: false
      expected_sha:
        type: string
        description: 'Release Bus immutable source SHA; blank for manual deploys'
        required: false
      artifact_run_id:
        type: string
        description: 'Release Bus preflight workflow run id'
        required: false
      artifact_train_id:
        type: string
        description: 'Release Bus train that produced the immutable artifact'
        required: false
      artifact_digest:
        type: string
        description: 'Release Bus immutable aggregate artifact digest'
        required: false
      break_glass_reason:
        type: string
        description: 'Operator-only reason for a manual deploy after bus enforcement'
        required: false

permissions:
  actions: read
  contents: read

# The workflow-level control mutex keeps manual and break-glass production
# deployments globally serial. Release Bus operations use their exact operation
# key here, then share the job-level environment/service mutex with every mode.
concurrency:
  group: deploy-control-${{ github.event.inputs.environment }}-${{ github.event.inputs.operation_key != '' && github.event.inputs.operation_key || (github.event.inputs.environment == 'prod' && 'manual-production' || github.event.inputs.service) }}
  cancel-in-progress: false

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  RELEASE_BUS_MODE: ${{ vars.RELEASE_BUS_MODE || 'OFF' }}
  RELEASE_BUS_V2_MODE: ${{ vars.RELEASE_BUS_V2_MODE || 'OFF' }}
  RELEASE_BUS_V2_BETA_ALLOWLIST: ${{ vars.RELEASE_BUS_V2_BETA_ALLOWLIST || '' }}
  RELEASE_BUS_BASE_EVIDENCE_REUSE: ${{ vars.RELEASE_BUS_BASE_EVIDENCE_REUSE || 'false' }}
  RELEASE_BUS_BASE_EVIDENCE_REUSE_SHADOW: ${{ vars.RELEASE_BUS_BASE_EVIDENCE_REUSE_SHADOW || 'false' }}
  RELEASE_BUS_BASE_EVIDENCE_MAX_AGE_HOURS: ${{ vars.RELEASE_BUS_BASE_EVIDENCE_MAX_AGE_HOURS || '24' }}
  RELEASE_BUS_BACKEND_DEPLOY_CONCURRENCY: ${{ vars.RELEASE_BUS_BACKEND_DEPLOY_CONCURRENCY || '20' }}
  RELEASE_BUS_GITHUB_ORG: ${{ vars.RELEASE_BUS_GITHUB_ORG || github.repository_owner }}
  RELEASE_BUS_UI_URL: ${{ vars.RELEASE_BUS_UI_URL || 'https://api.6529.io/deploy/ui/bus' }}
  ATTACHMENTS_INGEST_S3_BUCKET_PROD: ${{ secrets.ATTACHMENTS_INGEST_S3_BUCKET_PROD }}
  ATTACHMENTS_INGEST_S3_BUCKET_STAGING: ${{ secrets.ATTACHMENTS_INGEST_S3_BUCKET_STAGING }}
  DROP_MEDIA_SANITIZE_IMAGES_PROD: ${{ vars.DROP_MEDIA_SANITIZE_IMAGES_PROD }}
  DROP_MEDIA_SANITIZE_IMAGES_STAGING: ${{ vars.DROP_MEDIA_SANITIZE_IMAGES_STAGING }}
  DROP_MEDIA_INGEST_S3_BUCKET_PROD: ${{ vars.DROP_MEDIA_INGEST_S3_BUCKET_PROD }}
  DROP_MEDIA_INGEST_S3_BUCKET_STAGING: ${{ vars.DROP_MEDIA_INGEST_S3_BUCKET_STAGING }}
  DROP_MEDIA_INGEST_S3_REGION: ${{ vars.DROP_MEDIA_INGEST_S3_REGION }}
  DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME: ${{ vars.DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME }}
  API_GATEWAY_WS_ENDPOINT_PROD: https://ws.6529.io
  API_GATEWAY_WS_ENDPOINT_STAGING: https://ws.staging.6529.io

run-name: Deploy ${{ github.event.inputs.service }} to ${{ github.event.inputs.environment }} [${{ github.event.inputs.operation_key || 'manual' }}]

jobs:
  build-and-deploy:
    name: Build and deploy ${{ github.event.inputs.service }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-service-${{ github.event.inputs.environment }}-${{ github.event.inputs.service }}
      cancel-in-progress: false
    env:
      INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
      INPUT_SERVICE: ${{ github.event.inputs.service }}
      INPUT_TRAIN_ID: ${{ github.event.inputs.release_train_id }}
      INPUT_TRAIN_REVISION: ${{ github.event.inputs.release_train_revision }}
      INPUT_OPERATION_KEY: ${{ github.event.inputs.operation_key }}
      INPUT_EXPECTED_SHA: ${{ github.event.inputs.expected_sha }}
      INPUT_ARTIFACT_RUN_ID: ${{ github.event.inputs.artifact_run_id }}
      INPUT_ARTIFACT_TRAIN_ID: ${{ github.event.inputs.artifact_train_id }}
      INPUT_ARTIFACT_DIGEST: ${{ github.event.inputs.artifact_digest }}
    steps:
      - name: Validate dispatch inputs before using credentials
        shell: bash
        env:
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
          INPUT_SERVICE: ${{ github.event.inputs.service }}
          INPUT_TRAIN_ID: ${{ github.event.inputs.release_train_id }}
          INPUT_TRAIN_REVISION: ${{ github.event.inputs.release_train_revision }}
          INPUT_OPERATION_KEY: ${{ github.event.inputs.operation_key }}
          INPUT_EXPECTED_SHA: ${{ github.event.inputs.expected_sha }}
          INPUT_ARTIFACT_RUN_ID: ${{ github.event.inputs.artifact_run_id }}
          INPUT_ARTIFACT_TRAIN_ID: ${{ github.event.inputs.artifact_train_id }}
          INPUT_ARTIFACT_DIGEST: ${{ github.event.inputs.artifact_digest }}
        run: |
          set -euo pipefail
          [[ "$INPUT_ENVIRONMENT" =~ ^(staging|prod)$ ]]
          [[ "$INPUT_SERVICE" =~ ^(api|aggregatedActivityLoop|attachmentsOrchestrator|attachmentsProcessor|artCurationNftWatchLoop|cloudwatchAlarmsToDiscordLoop|claimsBuilder|claimsMediaArweaveUploader|customReplayLoop|dbDumpsDaily|dbMigrationsLoop|delegationsLoop|discoverEnsLoop|dropMediaIngestStorage|dropMediaSanitizer|dropVideoConversionInvokerLoop|ethPriceLoop|externalCollectionLiveTailingLoop|externalCollectionSnapshottingLoop|helpBotReplyLoop|marketStatsLoop|mediaResizerLoop|mintAnnouncementsLoop|nextgenContractLoop|nextgenMediaImageResolutions|nextgenMediaProxyInterceptor|nextgenMediaUploader|nextgenMetadataLoop|nftHistoryLoop|nftLinkRefresherLoop|nftLinkMediaPreviewLoop|nftOwnersLoop|nftsLoop|overRatesRevocationLoop|ownersBalancesLoop|populateHistoricConsolidatedTdh|pushNotificationsHandler|rateEventProcessingLoop|releaseBus|releaseNotesGenerationLoop|refreshEnsLoop|rememesLoop|royaltiesLoop|s3Uploader|subscriptionsDaily|subscriptionsTopUpLoop|xTdhGrantsReviewerLoop|tdhHistoryLoop|tdhLoop|teamLoop|transactionsLoop|transactionsProcessingLoop|waveDecisionExecutionLoop|waveLeaderboardSnapshotterLoop|waveDropMetricsRefreshLoop|waveScoreRefreshLoop|xTdhLoop)$ ]]
          if [ -n "$INPUT_OPERATION_KEY" ]; then
            [[ "$INPUT_TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
            [[ "$INPUT_TRAIN_REVISION" =~ ^[1-9][0-9]{0,8}$ ]]
            [[ "$INPUT_OPERATION_KEY" =~ ^[A-Za-z0-9:._-]{1,180}$ ]]
            [[ "$INPUT_EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
            [[ "$INPUT_ARTIFACT_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
            [[ "$INPUT_ARTIFACT_DIGEST" =~ ^[a-f0-9]{64}$ ]]
            if [ -n "$INPUT_ARTIFACT_TRAIN_ID" ]; then
              [[ "$INPUT_ARTIFACT_TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
            fi
          fi
      - name: Validate Release Bus GitHub App configuration
        if: github.event.inputs.service == 'releaseBus'
        shell: bash
        env:
          RELEASE_BUS_GITHUB_APP_ID: ${{ vars.RELEASE_BUS_GITHUB_APP_ID }}
          RELEASE_BUS_GITHUB_PRIVATE_KEY: ${{ secrets.RELEASE_BUS_GITHUB_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_BUS_MODE" =~ ^(OFF|SHADOW|STAGING|PRODUCTION)$ ]]
          [[ "$RELEASE_BUS_V2_MODE" =~ ^(OFF|STAGING|PRODUCTION)$ ]]
          if [ -n "$RELEASE_BUS_V2_BETA_ALLOWLIST" ]; then
            jq -e 'type == "array" and length > 0' <<< "$RELEASE_BUS_V2_BETA_ALLOWLIST" > /dev/null
          fi
          [[ "$RELEASE_BUS_BASE_EVIDENCE_REUSE" =~ ^(false|true)$ ]]
          [[ "$RELEASE_BUS_BASE_EVIDENCE_REUSE_SHADOW" =~ ^(false|true)$ ]]
          [[ "$RELEASE_BUS_BASE_EVIDENCE_MAX_AGE_HOURS" =~ ^([1-9]|[1-9][0-9]|1[0-5][0-9]|16[0-8])$ ]]
          [[ "$RELEASE_BUS_GITHUB_APP_ID" =~ ^[1-9][0-9]*$ ]]
          test -n "$RELEASE_BUS_GITHUB_PRIVATE_KEY"
      - name: Validate Release Bus API configuration
        if: github.event.inputs.service == 'api' && github.event.inputs.environment == 'prod'
        shell: bash
        env:
          RELEASE_BUS_GITHUB_APP_ID: ${{ vars.RELEASE_BUS_GITHUB_APP_ID }}
          RELEASE_BUS_GITHUB_PRIVATE_KEY: ${{ secrets.RELEASE_BUS_GITHUB_PRIVATE_KEY }}
          RELEASE_BUS_GITHUB_WEBHOOK_SECRET: ${{ secrets.RELEASE_BUS_GITHUB_WEBHOOK_SECRET }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_BUS_MODE" =~ ^(OFF|SHADOW|STAGING|PRODUCTION)$ ]]
          [[ "$RELEASE_BUS_V2_MODE" =~ ^(OFF|STAGING|PRODUCTION)$ ]]
          if [ -n "$RELEASE_BUS_V2_BETA_ALLOWLIST" ]; then
            jq -e 'type == "array" and length > 0' <<< "$RELEASE_BUS_V2_BETA_ALLOWLIST" > /dev/null
          fi
          [[ "$RELEASE_BUS_GITHUB_APP_ID" =~ ^[1-9][0-9]*$ ]]
          test -n "$RELEASE_BUS_GITHUB_PRIVATE_KEY"
          test -n "$RELEASE_BUS_GITHUB_WEBHOOK_SECRET"
          test -n "$RELEASE_BUS_WORKFLOW_AUTH_TOKEN"
      - name: Check production preconditions
        shell: bash
        if: (github.event.inputs.service == 'cloudwatchAlarmsToDiscordLoop' || github.event.inputs.service == 'mediaResizerLoop' || github.event.inputs.service == 'nextgenMediaImageResolutions' || github.event.inputs.service == 'nextgenMediaProxyInterceptor' || github.event.inputs.service == 'nextgenMediaUploader' || github.event.inputs.service == 'releaseBus' || github.event.inputs.service == 'releaseNotesGenerationLoop') && github.event.inputs.environment != 'prod'
        run: |
          echo "Given service can only be deployed to production environment" >&2
          exit 1
      - name: Check staging preconditions
        shell: bash
        if: (github.event.inputs.service == 'dropMediaIngestStorage' || github.event.inputs.service == 'dropVideoConversionInvokerLoop') && github.event.inputs.environment != 'staging'
        run: |
          echo "Given service can only be deployed to staging environment" >&2
          exit 1
      - name: Check production release-note preconditions
        shell: bash
        if: github.event.inputs.environment == 'prod' && !startsWith(github.event.inputs.operation_key, 'rb2:')
        env:
          RELEASE_PULL_REQUEST: ${{ github.event.inputs.release_pull_request }}
          RELEASE_GROUP_SERVICES: ${{ github.event.inputs.release_group_services }}
          RELEASE_NOTE_GROUPS: ${{ github.event.inputs.release_note_groups }}
          RELEASE_NOTE_PUBLISH: ${{ github.event.inputs.release_note_publish }}
          RELEASE_NOTE_OPT_OUT: ${{ github.event.inputs.release_note_opt_out }}
          RELEASE_SERVICE: ${{ github.event.inputs.service }}
        run: |
          set -euo pipefail
          if [ "$RELEASE_NOTE_OPT_OUT" = true ]; then
            if [ -n "$RELEASE_PULL_REQUEST" ] || [ -n "$RELEASE_GROUP_SERVICES" ] || [ -n "$RELEASE_NOTE_GROUPS" ] || [ "$RELEASE_NOTE_PUBLISH" = true ]; then
              echo "release_note_opt_out cannot include release-note metadata or a publish request" >&2
              exit 1
            fi
            exit 0
          fi
          if [ "$RELEASE_NOTE_OPT_OUT" != false ] && [ -n "$RELEASE_NOTE_OPT_OUT" ]; then
            echo "release_note_opt_out must be true or false" >&2
            exit 1
          fi
          if [ -n "$RELEASE_NOTE_GROUPS" ]; then
            echo "release_note_groups is reserved for Release Bus v2 operations" >&2
            exit 1
          fi
          if ! [[ "$RELEASE_PULL_REQUEST" =~ ^[1-9][0-9]*$ ]]; then
            echo "release_pull_request must be a positive PR number" >&2
            exit 1
          fi
          if [ -z "$RELEASE_GROUP_SERVICES" ]; then
            echo "release_group_services must contain the full canonical production service set" >&2
            exit 1
          fi
          case ",${RELEASE_GROUP_SERVICES}," in
            *,"${RELEASE_SERVICE}",*) ;;
            *)
              echo "release_group_services must include the deployed service ${RELEASE_SERVICE}" >&2
              exit 1
              ;;
          esac
      - name: Authorize operator break glass
        if: github.event.inputs.operation_key == '' && vars.RELEASE_BUS_ENFORCEMENT == 'true'
        shell: bash
        env:
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          INPUT_BREAK_GLASS_REASON: ${{ github.event.inputs.break_glass_reason }}
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_BUS_API_URL"
          test -n "$RELEASE_BUS_WORKFLOW_AUTH_TOKEN"
          test -n "$INPUT_BREAK_GLASS_REASON" || {
            echo 'A break-glass reason is required while Release Bus enforcement is enabled.' >&2
            exit 1
          }
          expected_sha="${INPUT_EXPECTED_SHA:-$GITHUB_SHA}"
          [[ "$expected_sha" =~ ^[a-f0-9]{40}$ ]]
          payload="$(jq -n             --arg workflow_run_id "$GITHUB_RUN_ID"             --arg repository backend             --arg environment "$INPUT_ENVIRONMENT"             --arg service "$INPUT_SERVICE"             --arg expected_sha "$expected_sha"             --arg reason "$INPUT_BREAK_GLASS_REASON"             '{workflow_run_id:$workflow_run_id,repository:$repository,environment:$environment,service:$service,expected_sha:$expected_sha,reason:$reason}')"
          curl --fail-with-body --silent --show-error             -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN"             -H 'Content-Type: application/json'             --data "$payload"             "$RELEASE_BUS_API_URL/deploy/release-bus/authorize-break-glass"
      - name: Authorize immutable Release Bus operation
        if: github.event.inputs.operation_key != ''
        shell: bash
        env:
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_BUS_API_URL"
          test -n "$RELEASE_BUS_WORKFLOW_AUTH_TOKEN"
          payload="$(jq -n             --arg train_id "$INPUT_TRAIN_ID"             --arg operation_key "$INPUT_OPERATION_KEY"             --arg workflow_run_id "$GITHUB_RUN_ID"             --arg artifact_run_id "$INPUT_ARTIFACT_RUN_ID"             --arg repository backend             --arg environment "$INPUT_ENVIRONMENT"             --arg service "$INPUT_SERVICE"             --arg expected_sha "$INPUT_EXPECTED_SHA"             --arg artifact_digest "$INPUT_ARTIFACT_DIGEST"             '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,artifact_run_id:$artifact_run_id,repository:$repository,environment:$environment,service:$service,expected_sha:$expected_sha,artifact_digest:$artifact_digest}')"
          curl --fail-with-body --silent --show-error             -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN"             -H 'Content-Type: application/json'             --data "$payload"             "$RELEASE_BUS_API_URL/deploy/release-bus-v2/authorize"
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> "$GITHUB_OUTPUT"
        id: extract_branch
      - name: Checkout
        id: source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.expected_sha || steps.extract_branch.outputs.branch }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install Node.js with cached deploy-tool downloads
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Activate pinned npm
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          corepack enable npm
          corepack install
          test "$(npm --version)" = "$(node -p 'require("./package.json").packageManager.split("npm@")[1]')"
      - name: Resolve Release Bus GitHub App installation
        if: github.event.inputs.service == 'releaseBus' || (github.event.inputs.service == 'api' && github.event.inputs.environment == 'prod')
        id: release_bus_app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.RELEASE_BUS_GITHUB_APP_ID }}
          private-key: ${{ secrets.RELEASE_BUS_GITHUB_PRIVATE_KEY }}
          owner: ${{ vars.RELEASE_BUS_GITHUB_ORG || github.repository_owner }}
          repositories: |
            6529seize-backend
            6529seize-frontend
      - name: Verify immutable source
        if: github.event.inputs.operation_key != ''
        shell: bash
        run: |
          set -euo pipefail
          [[ "$INPUT_EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          actual_sha="$(git rev-parse HEAD)"
          if [ "$actual_sha" != "$INPUT_EXPECTED_SHA" ]; then
            echo "Expected $INPUT_EXPECTED_SHA, checked out $actual_sha" >&2
            exit 1
          fi
      - name: Download immutable preflight artifact
        if: github.event.inputs.operation_key != ''
        id: artifact_download
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.inputs.artifact_run_id }}
          name: release-bus-backend-${{ github.event.inputs.artifact_train_id || github.event.inputs.release_train_id }}-r${{ github.event.inputs.release_train_revision }}
          path: release-bus-artifact
      - name: Verify immutable preflight artifact
        if: github.event.inputs.operation_key != ''
        id: release_bus_artifact
        shell: bash
        run: |
          set -euo pipefail
          [[ "$INPUT_EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$INPUT_TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          [[ "$INPUT_SERVICE" =~ ^(api|aggregatedActivityLoop|attachmentsOrchestrator|attachmentsProcessor|artCurationNftWatchLoop|cloudwatchAlarmsToDiscordLoop|claimsBuilder|claimsMediaArweaveUploader|customReplayLoop|dbDumpsDaily|dbMigrationsLoop|delegationsLoop|discoverEnsLoop|dropMediaIngestStorage|dropMediaSanitizer|dropVideoConversionInvokerLoop|ethPriceLoop|externalCollectionLiveTailingLoop|externalCollectionSnapshottingLoop|helpBotReplyLoop|marketStatsLoop|mediaResizerLoop|mintAnnouncementsLoop|nextgenContractLoop|nextgenMediaImageResolutions|nextgenMediaProxyInterceptor|nextgenMediaUploader|nextgenMetadataLoop|nftHistoryLoop|nftLinkRefresherLoop|nftLinkMediaPreviewLoop|nftOwnersLoop|nftsLoop|overRatesRevocationLoop|ownersBalancesLoop|populateHistoricConsolidatedTdh|pushNotificationsHandler|rateEventProcessingLoop|releaseBus|releaseNotesGenerationLoop|refreshEnsLoop|rememesLoop|royaltiesLoop|s3Uploader|subscriptionsDaily|subscriptionsTopUpLoop|xTdhGrantsReviewerLoop|tdhHistoryLoop|tdhLoop|teamLoop|transactionsLoop|transactionsProcessingLoop|waveDecisionExecutionLoop|waveLeaderboardSnapshotterLoop|waveDropMetricsRefreshLoop|waveScoreRefreshLoop|xTdhLoop)$ ]]
          artifact_train_id="${INPUT_ARTIFACT_TRAIN_ID:-$INPUT_TRAIN_ID}"
          [[ "$artifact_train_id" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          cd release-bus-artifact
          jq -e             --arg train_id "$artifact_train_id"             --arg source_sha "$INPUT_EXPECTED_SHA"             --arg service "$INPUT_SERVICE"             '.train_id == $train_id and .source_sha == $source_sha and (.units | index($service)) != null'             manifest.json >/dev/null
          sha256sum -c SHA256SUMS
          artifact_digest="$(sha256sum SHA256SUMS | cut -d' ' -f1)"
          test "$artifact_digest" = "$INPUT_ARTIFACT_DIGEST"
          package_digest="$(sha256sum "packages/$INPUT_SERVICE/index.zip" | cut -d' ' -f1)"
          echo "artifact_digest=$artifact_digest" >> "$GITHUB_OUTPUT"
          echo "package_digest=$package_digest" >> "$GITHUB_OUTPUT"
      - name: Install root dependencies for manual build
        if: github.event.inputs.operation_key == ''
        run: npm i
      - name: Install frozen root deploy tooling
        if: github.event.inputs.operation_key != ''
        run: npm ci
      - name: Install lambda dependencies
        if: github.event.inputs.service != 'api' && github.event.inputs.operation_key == ''
        run: npm i && pushd src/${{ github.event.inputs.service }} && npm i && popd
      - name: Install api dependencies
        if: github.event.inputs.service == 'api' && github.event.inputs.operation_key == ''
        run: pushd src/api-serverless && npm i && popd
      - name: Build service
        if: github.event.inputs.service != 'api' && github.event.inputs.operation_key == ''
        run: pushd src/${{ github.event.inputs.service }} && npm run build && popd
      - name: Build API
        if: github.event.inputs.service == 'api' && github.event.inputs.operation_key == ''
        run: pushd src/api-serverless && npm run build && popd
      - name: Install immutable package
        if: github.event.inputs.operation_key != ''
        shell: bash
        run: |
          set -euo pipefail
          [[ "$INPUT_SERVICE" =~ ^(api|aggregatedActivityLoop|attachmentsOrchestrator|attachmentsProcessor|artCurationNftWatchLoop|cloudwatchAlarmsToDiscordLoop|claimsBuilder|claimsMediaArweaveUploader|customReplayLoop|dbDumpsDaily|dbMigrationsLoop|delegationsLoop|discoverEnsLoop|dropMediaIngestStorage|dropMediaSanitizer|dropVideoConversionInvokerLoop|ethPriceLoop|externalCollectionLiveTailingLoop|externalCollectionSnapshottingLoop|helpBotReplyLoop|marketStatsLoop|mediaResizerLoop|mintAnnouncementsLoop|nextgenContractLoop|nextgenMediaImageResolutions|nextgenMediaProxyInterceptor|nextgenMediaUploader|nextgenMetadataLoop|nftHistoryLoop|nftLinkRefresherLoop|nftLinkMediaPreviewLoop|nftOwnersLoop|nftsLoop|overRatesRevocationLoop|ownersBalancesLoop|populateHistoricConsolidatedTdh|pushNotificationsHandler|rateEventProcessingLoop|releaseBus|releaseNotesGenerationLoop|refreshEnsLoop|rememesLoop|royaltiesLoop|s3Uploader|subscriptionsDaily|subscriptionsTopUpLoop|xTdhGrantsReviewerLoop|tdhHistoryLoop|tdhLoop|teamLoop|transactionsLoop|transactionsProcessingLoop|waveDecisionExecutionLoop|waveLeaderboardSnapshotterLoop|waveDropMetricsRefreshLoop|waveScoreRefreshLoop|xTdhLoop)$ ]]
          if [ "$INPUT_SERVICE" = api ]; then
            destination=src/api-serverless/dist
          else
            destination="src/$INPUT_SERVICE/dist"
          fi
          rm -rf "$destination"
          mkdir -p "$destination"
