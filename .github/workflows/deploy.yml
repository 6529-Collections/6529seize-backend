# This file is generated by scripts/generate-deploy-config.mjs.
# Edit src/config/deploy-services.json and rerun the generator instead.
name: Deploy a service

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment'
        required: true
        default: staging
        options:
          - staging
          - prod
      service:
        type: choice
        description: 'Service'
        required: true
        default: api
        options:
          - api
          - aggregatedActivityLoop
          - attachmentsOrchestrator
          - attachmentsProcessor
          - artCurationNftWatchLoop
          - cloudwatchAlarmsToDiscordLoop
          - claimsBuilder
          - claimsMediaArweaveUploader
          - customReplayLoop
          - dbDumpsDaily
          - dbMigrationsLoop
          - delegationsLoop
          - discoverEnsLoop
          - dropMediaIngestStorage
          - dropMediaSanitizer
          - dropVideoConversionInvokerLoop
          - ethPriceLoop
          - externalCollectionLiveTailingLoop
          - externalCollectionSnapshottingLoop
          - helpBotReplyLoop
          - marketStatsLoop
          - mediaResizerLoop
          - mintAnnouncementsLoop
          - nextgenContractLoop
          - nextgenMediaImageResolutions
          - nextgenMediaProxyInterceptor
          - nextgenMediaUploader
          - nextgenMetadataLoop
          - nftHistoryLoop
          - nftLinkRefresherLoop
          - nftLinkMediaPreviewLoop
          - nftOwnersLoop
          - nftsLoop
          - overRatesRevocationLoop
          - ownersBalancesLoop
          - populateHistoricConsolidatedTdh
          - pushNotificationsHandler
          - rateEventProcessingLoop
          - releaseNotesGenerationLoop
          - refreshEnsLoop
          - rememesLoop
          - royaltiesLoop
          - s3Uploader
          - subscriptionsDaily
          - subscriptionsTopUpLoop
          - xTdhGrantsReviewerLoop
          - tdhHistoryLoop
          - tdhLoop
          - teamLoop
          - transactionsLoop
          - transactionsProcessingLoop
          - waveDecisionExecutionLoop
          - waveLeaderboardSnapshotterLoop
          - waveDropMetricsRefreshLoop
          - waveScoreRefreshLoop
          - xTdhLoop
      release_group_id:
        type: string
        description: 'Internal ghdeploy value; leave blank for manual deploys'
        required: false
      release_group_services:
        type: string
        description: 'Full comma-separated PR service set; ghdeploy fills this'
        required: false
      release_pull_request:
        type: string
        description: 'Merged PR represented by this production release'
        required: false

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  ATTACHMENTS_INGEST_S3_BUCKET_PROD: ${{ secrets.ATTACHMENTS_INGEST_S3_BUCKET_PROD }}
  ATTACHMENTS_INGEST_S3_BUCKET_STAGING: ${{ secrets.ATTACHMENTS_INGEST_S3_BUCKET_STAGING }}
  DROP_MEDIA_SANITIZE_IMAGES_PROD: ${{ vars.DROP_MEDIA_SANITIZE_IMAGES_PROD }}
  DROP_MEDIA_SANITIZE_IMAGES_STAGING: ${{ vars.DROP_MEDIA_SANITIZE_IMAGES_STAGING }}
  DROP_MEDIA_INGEST_S3_BUCKET_PROD: ${{ vars.DROP_MEDIA_INGEST_S3_BUCKET_PROD }}
  DROP_MEDIA_INGEST_S3_BUCKET_STAGING: ${{ vars.DROP_MEDIA_INGEST_S3_BUCKET_STAGING }}
  DROP_MEDIA_INGEST_S3_REGION: ${{ vars.DROP_MEDIA_INGEST_S3_REGION }}
  DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME: ${{ vars.DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME }}
  API_GATEWAY_WS_ENDPOINT_PROD: https://ws.6529.io
  API_GATEWAY_WS_ENDPOINT_STAGING: https://ws.staging.6529.io

run-name: Deploy ${{ github.event.inputs.service }} to ${{ github.event.inputs.environment }}

jobs:
  build-and-deploy:
    name: Build and deploy ${{ github.event.inputs.service }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Check production preconditions
        shell: bash
        if: (github.event.inputs.service == 'cloudwatchAlarmsToDiscordLoop' || github.event.inputs.service == 'mediaResizerLoop' || github.event.inputs.service == 'nextgenMediaImageResolutions' || github.event.inputs.service == 'nextgenMediaProxyInterceptor' || github.event.inputs.service == 'nextgenMediaUploader' || github.event.inputs.service == 'releaseNotesGenerationLoop') && github.event.inputs.environment != 'prod'
        run: |
          echo "Given service can only be deployed to production environment" >&2
          exit 1
      - name: Check staging preconditions
        shell: bash
        if: (github.event.inputs.service == 'dropMediaIngestStorage' || github.event.inputs.service == 'dropVideoConversionInvokerLoop') && github.event.inputs.environment != 'staging'
        run: |
          echo "Given service can only be deployed to staging environment" >&2
          exit 1
      - name: Check production release-note preconditions
        shell: bash
        if: github.event.inputs.environment == 'prod' && github.event.inputs.release_pull_request == ''
        run: |
          echo "A merged release_pull_request is required for production deploys" >&2
          exit 1
      - name: Validate production release PR
        shell: bash
        if: github.event.inputs.environment == 'prod'
        env:
          RELEASE_PULL_REQUEST: ${{ github.event.inputs.release_pull_request }}
        run: |
          if ! [[ "$RELEASE_PULL_REQUEST" =~ ^[1-9][0-9]*$ ]]; then
            echo "release_pull_request must be a positive PR number" >&2
            exit 1
          fi
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> "$GITHUB_OUTPUT"
        id: extract_branch
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.extract_branch.outputs.branch }}
      - name: Install root dependencies
        run: npm i
      - name: Install lambda dependencies
        if: github.event.inputs.service != 'api'
        run: npm i && pushd src/${{ github.event.inputs.service }} && npm i && popd
      - name: Install api dependencies
        if: github.event.inputs.service == 'api'
        run: pushd src/api-serverless && npm i && popd
      - name: Build service
        if: github.event.inputs.service != 'api'
        run: pushd src/${{ github.event.inputs.service }} && npm run build && popd
      - name: Build API
        if: github.event.inputs.service == 'api'
        run: pushd src/api-serverless && npm run build && popd
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.environment == 'prod' && 'us-east-1' || 'eu-west-1' }}
      - name: Select environment-specific config
        shell: bash
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            ATTACHMENTS_BUCKET="$ATTACHMENTS_INGEST_S3_BUCKET_PROD"
            DROP_MEDIA_SANITIZE_IMAGES_VALUE="${DROP_MEDIA_SANITIZE_IMAGES_PROD:-false}"
            DROP_MEDIA_INGEST_BUCKET="$DROP_MEDIA_INGEST_S3_BUCKET_PROD"
            API_GATEWAY_WS_ENDPOINT="$API_GATEWAY_WS_ENDPOINT_PROD"
          else
            ATTACHMENTS_BUCKET="$ATTACHMENTS_INGEST_S3_BUCKET_STAGING"
            DROP_MEDIA_SANITIZE_IMAGES_VALUE="${DROP_MEDIA_SANITIZE_IMAGES_STAGING:-false}"
            DROP_MEDIA_INGEST_BUCKET="$DROP_MEDIA_INGEST_S3_BUCKET_STAGING"
            API_GATEWAY_WS_ENDPOINT="$API_GATEWAY_WS_ENDPOINT_STAGING"
          fi
          DROP_MEDIA_INGEST_REGION="$DROP_MEDIA_INGEST_S3_REGION"
          DROP_MEDIA_SANITIZER_QUEUE="$DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME"

          if [ -z "$ATTACHMENTS_BUCKET" ]; then
            echo "ATTACHMENTS_INGEST_S3_BUCKET is not configured for ${{ github.event.inputs.environment }}"
            exit 1
          fi

          if [ -z "$API_GATEWAY_WS_ENDPOINT" ]; then
            echo "API_GATEWAY_WS_ENDPOINT is not configured for ${{ github.event.inputs.environment }}"
            exit 1
          fi

          if [ "$DROP_MEDIA_SANITIZE_IMAGES_VALUE" != "true" ]; then
            DROP_MEDIA_SANITIZE_IMAGES_VALUE="false"
          fi

          if [ "$DROP_MEDIA_SANITIZE_IMAGES_VALUE" = "true" ]; then
            if [ -z "$DROP_MEDIA_INGEST_BUCKET" ]; then
              echo "DROP_MEDIA_INGEST_S3_BUCKET is not configured for ${{ github.event.inputs.environment }}"
              exit 1
            fi
            if [ -z "$DROP_MEDIA_INGEST_REGION" ]; then
              echo "DROP_MEDIA_INGEST_S3_REGION is not configured"
              exit 1
            fi
            if [ -z "$DROP_MEDIA_SANITIZER_QUEUE" ]; then
              echo "DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME is not configured"
              exit 1
            fi
          fi

          {
            echo "ATTACHMENTS_INGEST_S3_BUCKET=$ATTACHMENTS_BUCKET"
            echo "DROP_MEDIA_SANITIZE_IMAGES=$DROP_MEDIA_SANITIZE_IMAGES_VALUE"
            echo "DROP_MEDIA_INGEST_S3_BUCKET=$DROP_MEDIA_INGEST_BUCKET"
            echo "DROP_MEDIA_INGEST_S3_REGION=$DROP_MEDIA_INGEST_REGION"
            echo "DROP_MEDIA_INGEST_STAGE=${{ github.event.inputs.environment }}"
            echo "DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME=$DROP_MEDIA_SANITIZER_QUEUE"
            echo "API_GATEWAY_WS_ENDPOINT=$API_GATEWAY_WS_ENDPOINT"
          } >> "$GITHUB_ENV"
      - name: Deploy service
        if: github.event.inputs.service != 'api' && github.event.inputs.service != 'nextgenMediaProxyInterceptor' && github.event.inputs.service != 'mediaResizerLoop'
        run: |
          VERSION_DESCRIPTION="$(git rev-parse --short HEAD) - $(date) - $(git rev-parse --abbrev-ref HEAD) - $(git show -s --format=%s)"
          export VERSION_DESCRIPTION
          pushd src/${{ github.event.inputs.service }} && npm run sls-deploy:${{ github.event.inputs.environment }} && popd
      - name: Deploy API
        if: github.event.inputs.service == 'api'
        run: |
          set +x
          GIT_COMMIT=$(git rev-parse HEAD)
          VERSION_DESCRIPTION="$(git rev-parse --short HEAD) - $(date) - $(git rev-parse --abbrev-ref HEAD) - $(git show -s --format=%s)"
          DEPLOY_REGION="${{ github.event.inputs.environment == 'prod' && 'us-east-1' || 'eu-west-1' }}"
          API_MEMORY_SIZE=2048
          API_TIMEOUT=30
          CLAIMS_MEDIA_ARWEAVE_UPLOAD_SQS_URL="https://sqs.${DEPLOY_REGION}.amazonaws.com/987989283142/claims-media-arweave-upload"
          aws lambda update-function-code --function-name seizeAPI --zip-file fileb://src/api-serverless/dist/index.zip --no-cli-pager > /dev/null 2>&1
          sleep 10
          aws lambda get-function-configuration --function-name seizeAPI --query 'Environment.Variables' --output json --no-cli-pager > /tmp/current_env.json 2>/dev/null || echo '{}' > /tmp/current_env.json
          jq --arg commit "$GIT_COMMIT" --arg claimsMediaArweaveUploadSqsUrl "$CLAIMS_MEDIA_ARWEAVE_UPLOAD_SQS_URL" --arg attachmentsIngestS3Bucket "$ATTACHMENTS_INGEST_S3_BUCKET" --arg dropMediaSanitizeImages "$DROP_MEDIA_SANITIZE_IMAGES" --arg dropMediaIngestS3Bucket "$DROP_MEDIA_INGEST_S3_BUCKET" --arg dropMediaIngestS3Region "$DROP_MEDIA_INGEST_S3_REGION" --arg dropMediaIngestStage "$DROP_MEDIA_INGEST_STAGE" --arg dropMediaSanitizerSqsQueueName "$DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME" --arg apiGatewayWsEndpoint "$API_GATEWAY_WS_ENDPOINT" '. + {GIT_COMMIT: $commit, CLAIMS_MEDIA_ARWEAVE_UPLOAD_SQS_URL: $claimsMediaArweaveUploadSqsUrl, ATTACHMENTS_INGEST_S3_BUCKET: $attachmentsIngestS3Bucket, DROP_MEDIA_SANITIZE_IMAGES: $dropMediaSanitizeImages, DROP_MEDIA_INGEST_S3_BUCKET: $dropMediaIngestS3Bucket, DROP_MEDIA_INGEST_S3_REGION: $dropMediaIngestS3Region, DROP_MEDIA_INGEST_STAGE: $dropMediaIngestStage, DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME: $dropMediaSanitizerSqsQueueName, API_GATEWAY_WS_ENDPOINT: $apiGatewayWsEndpoint} | {Variables: .}' /tmp/current_env.json > /tmp/env_config.json
          aws lambda update-function-configuration --function-name seizeAPI --description "$VERSION_DESCRIPTION" --environment file:///tmp/env_config.json --memory-size "$API_MEMORY_SIZE" --timeout "$API_TIMEOUT" --no-cli-pager > /dev/null 2>&1
          rm -f /tmp/current_env.json /tmp/env_config.json
      - name: Deploy mediaResizerLoop
        if: github.event.inputs.service == 'mediaResizerLoop'
        run: |
          VERSION_DESCRIPTION="$(git rev-parse --short HEAD) - $(date) - $(git rev-parse --abbrev-ref HEAD) - $(git show -s --format=%s)"
          aws lambda update-function-code --function-name  mediaResizerLoop --zip-file fileb://src/mediaResizerLoop/dist/index.zip
          sleep 10
          aws lambda update-function-configuration --function-name mediaResizerLoop --runtime nodejs22.x --description "$VERSION_DESCRIPTION"
      - name: Deploy nextgenMediaProxyInterceptor
        if: github.event.inputs.service == 'nextgenMediaProxyInterceptor'
        run: |
          pushd src/nextgenMediaProxyInterceptor
          sh deploy.sh
          popd
      - name: Run lambda and validate result
        if: github.event.inputs.service == 'dbMigrationsLoop'
        run: |
          sleep 10

          aws lambda invoke --function-name ${{ github.event.inputs.service }} response.json > meta.json

          printf "\nresponse.json:\n"
          cat response.json
          printf "\n\nmeta.json:\n"
          cat meta.json
          printf "\n"

          if jq -e '.FunctionError == "Unhandled"' meta.json > /dev/null; then
            echo "Lambda function threw an unhandled error"
            exit 1
          fi
      - name: Notify about failure
        uses: sarisia/actions-status-discord@v1
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          title: Seize-Lambda ${{ github.event.inputs.environment }} ${{ github.event.inputs.service }} DEPLOY CI pipeline is broken!!!
          content: '@everyone'
          color: 0xff0000

      - name: Notify CI wave about failure
        if: failure()
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.environment }}
          CI_PIPELINES_STATUS: failure
          CI_PIPELINES_TITLE: Seize-Lambda ${{ github.event.inputs.environment }} ${{ github.event.inputs.service }} DEPLOY CI pipeline is broken!!!
          CI_PIPELINES_ENVIRONMENT: ${{ github.event.inputs.environment }}
          CI_PIPELINES_SERVICE: ${{ github.event.inputs.service }}
        run: node scripts/notify-ci-wave.mjs

      - name: Notify about success
        uses: sarisia/actions-status-discord@v1
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          title: Seize-Lambda ${{ github.event.inputs.environment }} ${{ github.event.inputs.service }} DEPLOY CI pipeline complete
          color: 0x00ff00

      - name: Notify CI wave about success
        if: success()
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.environment }}
          CI_PIPELINES_STATUS: success
          CI_PIPELINES_TITLE: Seize-Lambda ${{ github.event.inputs.environment }} ${{ github.event.inputs.service }} DEPLOY CI pipeline complete
          CI_PIPELINES_ENVIRONMENT: ${{ github.event.inputs.environment }}
          CI_PIPELINES_SERVICE: ${{ github.event.inputs.service }}
          CI_RELEASE_NOTES_PROMPT_PATH: ops/release-notes/release-notes.prompt.md
          CI_RELEASE_GROUP_ID: ${{ github.event.inputs.release_group_id }}
          CI_RELEASE_GROUP_SERVICES: ${{ github.event.inputs.release_group_services }}
          CI_RELEASE_PULL_REQUEST: ${{ github.event.inputs.release_pull_request }}
        run: node scripts/notify-ci-wave.mjs
