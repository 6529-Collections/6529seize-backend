          rm -f /tmp/current_env.json /tmp/app_env.json /tmp/runtime_env.json /tmp/env_config.json
      - name: Deploy mediaResizerLoop
        if: github.event.inputs.service == 'mediaResizerLoop'
        run: |
          VERSION_DESCRIPTION="$(git rev-parse --short HEAD) - $(date) - $(git rev-parse --abbrev-ref HEAD) - $(git show -s --format=%s)"
          aws lambda update-function-code --function-name  mediaResizerLoop --zip-file fileb://src/mediaResizerLoop/dist/index.zip
          sleep 10
          aws lambda update-function-configuration --function-name mediaResizerLoop --runtime nodejs22.x --description "$VERSION_DESCRIPTION"
      - name: Deploy nextgenMediaProxyInterceptor
        if: github.event.inputs.service == 'nextgenMediaProxyInterceptor'
        run: |
          pushd src/nextgenMediaProxyInterceptor
          sh deploy.sh
          popd
      - name: Run lambda and validate result
        if: github.event.inputs.service == 'dbMigrationsLoop'
        run: |
          sleep 10

          aws lambda invoke --function-name ${{ github.event.inputs.service }} response.json > meta.json

          printf "\nresponse.json:\n"
          cat response.json
          printf "\n\nmeta.json:\n"
          cat meta.json
          printf "\n"

          if jq -e '.FunctionError == "Unhandled"' meta.json > /dev/null; then
            echo "Lambda function threw an unhandled error"
            exit 1
          fi
      - name: Verify immutable Lambda code
        if: github.event.inputs.operation_key != ''
        shell: bash
        env:
          VERIFICATION_TARGETS_BY_SERVICE: '{"api":["seizeAPI"],"aggregatedActivityLoop":["aggregatedActivityLoop"],"attachmentsOrchestrator":["attachmentsOrchestrator"],"attachmentsProcessor":["attachmentsProcessor"],"artCurationNftWatchLoop":["artCurationNftWatchLoop"],"cloudwatchAlarmsToDiscordLoop":["cloudwatchAlarmsToDiscordLoop"],"claimsBuilder":["claimsBuilder"],"claimsMediaArweaveUploader":["claimsMediaArweaveUploader"],"customReplayLoop":["customReplayLoop"],"dbDumpsDaily":["dbDumpsDaily"],"dbMigrationsLoop":["dbMigrationsLoop"],"delegationsLoop":["delegationsLoop"],"discoverEnsLoop":["discoverEnsLoop"],"dropMediaIngestStorage":[],"dropMediaSanitizer":["dropMediaSanitizer"],"dropVideoConversionInvokerLoop":["dropVideoConversionInvokerLoop"],"ethPriceLoop":["ethPriceLoop"],"externalCollectionLiveTailingLoop":["externalCollectionLiveTailingLoop"],"externalCollectionSnapshottingLoop":["externalCollectionSnapshottingLoop"],"helpBotReplyLoop":["helpBotReplyLoop"],"marketStatsLoop":["marketStatsMEMES","marketStatsLAB","marketStatsGRADIENT","marketStatsNEXTGEN"],"mediaResizerLoop":["mediaResizerLoop"],"mintAnnouncementsLoop":["mintAnnouncementsLoop"],"nextgenContractLoop":["nextgenContractLoop"],"nextgenMediaImageResolutions":["nextgenMediaImageResolutions"],"nextgenMediaProxyInterceptor":["nextgenMediaProxyInterceptor"],"nextgenMediaUploader":["nextgenMediaUploader"],"nextgenMetadataLoop":["nextgenMetadataLoop"],"nftHistoryLoop":["nftHistoryLoop"],"nftLinkRefresherLoop":["nftLinkRefresherLoop"],"nftLinkMediaPreviewLoop":["nftLinkMediaPreviewLoop"],"nftOwnersLoop":["nftOwnersLoop"],"nftsLoop":["nftsLoop"],"overRatesRevocationLoop":["overRatesRevocationLoop"],"ownersBalancesLoop":["ownersBalancesLoop"],"populateHistoricConsolidatedTdh":["populateHistoricConsolidatedTdh"],"pushNotificationsHandler":["pushNotificationsHandler"],"rateEventProcessingLoop":["rateEventProcessingLoop"],"releaseBus":["releaseBusStarter","releaseBusWorker","releaseBusCleaner","releaseBusV2Reconciler"],"releaseNotesGenerationLoop":["releaseNotesGenerationLoop"],"refreshEnsLoop":["refreshENS"],"rememesLoop":["rememesS3Loop","rememesRefreshMetadataLoop","rememesFileLoop"],"royaltiesLoop":["royaltiesLoop"],"s3Uploader":["s3Uploader"],"subscriptionsDaily":["subscriptionsDaily"],"subscriptionsTopUpLoop":["subscriptionsTopUpLoop"],"xTdhGrantsReviewerLoop":["xTdhGrantsReviewerLoop"],"tdhHistoryLoop":["tdhHistoryLoop"],"tdhLoop":["tdhLoop"],"teamLoop":["teamLoop"],"transactionsLoop":["memesTransactionsLoop","gradientsTransactionsLoop","memeLabTransactionsLoop"],"transactionsProcessingLoop":["transactionsProcessingLoop"],"waveDecisionExecutionLoop":["waveDecisionExecutionLoop"],"waveLeaderboardSnapshotterLoop":["waveLeaderboardSnapshotterLoop"],"waveDropMetricsRefreshLoop":["waveDropMetricsRefreshLoop"],"waveScoreRefreshLoop":["waveScoreRefreshLoop"],"xTdhLoop":["xTdhLoop"]}'
        run: |
          set -euo pipefail
          [[ "$INPUT_SERVICE" =~ ^(api|aggregatedActivityLoop|attachmentsOrchestrator|attachmentsProcessor|artCurationNftWatchLoop|cloudwatchAlarmsToDiscordLoop|claimsBuilder|claimsMediaArweaveUploader|customReplayLoop|dbDumpsDaily|dbMigrationsLoop|delegationsLoop|discoverEnsLoop|dropMediaIngestStorage|dropMediaSanitizer|dropVideoConversionInvokerLoop|ethPriceLoop|externalCollectionLiveTailingLoop|externalCollectionSnapshottingLoop|helpBotReplyLoop|marketStatsLoop|mediaResizerLoop|mintAnnouncementsLoop|nextgenContractLoop|nextgenMediaImageResolutions|nextgenMediaProxyInterceptor|nextgenMediaUploader|nextgenMetadataLoop|nftHistoryLoop|nftLinkRefresherLoop|nftLinkMediaPreviewLoop|nftOwnersLoop|nftsLoop|overRatesRevocationLoop|ownersBalancesLoop|populateHistoricConsolidatedTdh|pushNotificationsHandler|rateEventProcessingLoop|releaseBus|releaseNotesGenerationLoop|refreshEnsLoop|rememesLoop|royaltiesLoop|s3Uploader|subscriptionsDaily|subscriptionsTopUpLoop|xTdhGrantsReviewerLoop|tdhHistoryLoop|tdhLoop|teamLoop|transactionsLoop|transactionsProcessingLoop|waveDecisionExecutionLoop|waveLeaderboardSnapshotterLoop|waveDropMetricsRefreshLoop|waveScoreRefreshLoop|xTdhLoop)$ ]]
          if [ "$INPUT_SERVICE" = api ]; then
            package_path=src/api-serverless/dist/index.zip
          else
            package_path="src/$INPUT_SERVICE/dist/index.zip"
          fi
          expected_code_sha="$(openssl dgst -sha256 -binary "$package_path" | base64 | tr -d '\n')"
          targets="$(jq -cr --arg service "$INPUT_SERVICE" '.[$service]' <<< "$VERIFICATION_TARGETS_BY_SERVICE")"
          while IFS= read -r function_name; do
            actual_code_sha="$(aws lambda get-function-configuration               --function-name "$function_name"               --query CodeSha256               --output text)"
            if [ "$actual_code_sha" != "$expected_code_sha" ]; then
              echo "Lambda $function_name has code digest $actual_code_sha, expected $expected_code_sha" >&2
              exit 1
            fi
          done < <(jq -r '.[]' <<< "$targets")
      - name: Verify resources-only CloudFormation stack
        if: github.event.inputs.operation_key != '' && (github.event.inputs.service == 'dropMediaIngestStorage')
        shell: bash
        run: |
          set -euo pipefail
          [[ "$INPUT_SERVICE" =~ ^(api|aggregatedActivityLoop|attachmentsOrchestrator|attachmentsProcessor|artCurationNftWatchLoop|cloudwatchAlarmsToDiscordLoop|claimsBuilder|claimsMediaArweaveUploader|customReplayLoop|dbDumpsDaily|dbMigrationsLoop|delegationsLoop|discoverEnsLoop|dropMediaIngestStorage|dropMediaSanitizer|dropVideoConversionInvokerLoop|ethPriceLoop|externalCollectionLiveTailingLoop|externalCollectionSnapshottingLoop|helpBotReplyLoop|marketStatsLoop|mediaResizerLoop|mintAnnouncementsLoop|nextgenContractLoop|nextgenMediaImageResolutions|nextgenMediaProxyInterceptor|nextgenMediaUploader|nextgenMetadataLoop|nftHistoryLoop|nftLinkRefresherLoop|nftLinkMediaPreviewLoop|nftOwnersLoop|nftsLoop|overRatesRevocationLoop|ownersBalancesLoop|populateHistoricConsolidatedTdh|pushNotificationsHandler|rateEventProcessingLoop|releaseBus|releaseNotesGenerationLoop|refreshEnsLoop|rememesLoop|royaltiesLoop|s3Uploader|subscriptionsDaily|subscriptionsTopUpLoop|xTdhGrantsReviewerLoop|tdhHistoryLoop|tdhLoop|teamLoop|transactionsLoop|transactionsProcessingLoop|waveDecisionExecutionLoop|waveLeaderboardSnapshotterLoop|waveDropMetricsRefreshLoop|waveScoreRefreshLoop|xTdhLoop)$ ]]
          [[ "$INPUT_ENVIRONMENT" =~ ^(staging|prod)$ ]]
          stack_name="$INPUT_SERVICE-$INPUT_ENVIRONMENT"
          stack_status="$(aws cloudformation describe-stacks             --stack-name "$stack_name"             --query 'Stacks[0].StackStatus'             --output text)"
          case "$stack_status" in
            CREATE_COMPLETE|UPDATE_COMPLETE) ;;
            *) echo "CloudFormation stack $stack_name is $stack_status" >&2; exit 1 ;;
          esac
      - name: Verify Lambda at Edge association
        if: github.event.inputs.operation_key != '' && (github.event.inputs.service == 'nextgenMediaProxyInterceptor')
        shell: bash
        run: |
          set -euo pipefail
          distribution_id=E1RI37JRN0ZK6J
          aws cloudfront wait distribution-deployed --id "$distribution_id"
          latest_arn="$(aws lambda list-versions-by-function             --function-name nextgenMediaProxyInterceptor             --region us-east-1             --query "max_by(Versions, &to_number(to_number(Version) || '0')).FunctionArn"             --output text)"
          aws cloudfront get-distribution-config --id "$distribution_id"             | jq -r '.DistributionConfig.CacheBehaviors.Items[] | select(.PathPattern == "/mainnet/metadata/*" or .PathPattern == "/testnet/metadata/*") | .LambdaFunctionAssociations.Items[].LambdaFunctionARN'             | grep -Fx "$latest_arn"
      - name: Verify API health and exact version
        if: github.event.inputs.operation_key != '' && github.event.inputs.service == 'api'
        shell: bash
        run: |
          set -euo pipefail
          [[ "$INPUT_ENVIRONMENT" =~ ^(staging|prod)$ ]]
          [[ "$INPUT_EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          if [ "$INPUT_ENVIRONMENT" = prod ]; then
            health_url=https://api.6529.io/health
          else
            health_url=https://api.staging.6529.io/health
          fi
          for attempt in {1..18}; do
            health="$(curl --fail --silent --show-error --max-time 15 "$health_url" || true)"
            if [ "$(jq -r '.version.commit // ""' <<< "$health")" = "$INPUT_EXPECTED_SHA" ] && [ "$(jq -r '.status // ""' <<< "$health")" = ok ]; then
              exit 0
            fi
            sleep 10
          done
          echo "API did not report healthy exact commit $INPUT_EXPECTED_SHA" >&2
          exit 1
      - name: Report structured Release Bus deployment result
        if: always() && github.event.inputs.operation_key != ''
        shell: bash
        env:
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          DOWNLOAD_OUTCOME: ${{ steps.artifact_download.outcome }}
          ARTIFACT_OUTCOME: ${{ steps.release_bus_artifact.outcome }}
          AWS_OUTCOME: ${{ steps.aws_credentials.outcome }}
        run: |
          set -euo pipefail
          status=SUCCEEDED
          failure_class=null
          failure_phase=null
          retryable=false
          if [ "$JOB_STATUS" != success ]; then
            status=FAILED
            failure_class=DEPLOYMENT
            failure_phase=service_deploy
            retryable=true
            if [ "$SOURCE_OUTCOME" = failure ] || [ "$DOWNLOAD_OUTCOME" = failure ]; then
              failure_class=INFRASTRUCTURE
              failure_phase=artifact_transport
              retryable=true
            elif [ "$ARTIFACT_OUTCOME" = failure ] || [ "$AWS_OUTCOME" = failure ]; then
              failure_class=CONTROL_PLANE
              failure_phase=deployment_identity_or_credentials
            fi
          fi
          payload="$(jq -n --arg train_id "$INPUT_TRAIN_ID" --arg operation_key "$INPUT_OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg status "$status" --arg failure_class "$failure_class" --arg failure_phase "$failure_phase" --argjson retryable "$retryable" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,phase:"complete",status:$status,failure_class:(if $failure_class == "null" then null else $failure_class end),failure_phase:(if $failure_phase == "null" then null else $failure_phase end),retryable:$retryable,summary:null,stages:[],jest:null,backend_evidence:null}')"
          curl --fail-with-body --silent --show-error             -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN"             -H 'Content-Type: application/json'             --data "$payload"             "$RELEASE_BUS_API_URL/deploy/release-bus-v2/report-progress"
      - name: Checkout CI wave notifier after early failure
        if: failure() && hashFiles('scripts/notify-ci-wave.mjs') == ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false
          sparse-checkout: scripts/notify-ci-wave.mjs
          sparse-checkout-cone-mode: false
      - name: Notify about failure
        uses: sarisia/actions-status-discord@v1
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          title: Seize-Lambda ${{ github.event.inputs.environment }} ${{ github.event.inputs.service }} DEPLOY CI pipeline is broken!!!
          content: '@everyone'
          color: 0xff0000

      - name: Notify CI wave about failure
        if: failure()
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.environment }}
          CI_PIPELINES_STATUS: failure
          CI_PIPELINES_TITLE: Seize-Lambda ${{ github.event.inputs.environment }} ${{ github.event.inputs.service }} DEPLOY CI pipeline is broken!!!
          CI_PIPELINES_ENVIRONMENT: ${{ github.event.inputs.environment }}
          CI_PIPELINES_SERVICE: ${{ github.event.inputs.service }}
        run: node scripts/notify-ci-wave.mjs

      - name: Notify about success
        uses: sarisia/actions-status-discord@v1
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          title: Seize-Lambda ${{ github.event.inputs.environment }} ${{ github.event.inputs.service }} DEPLOY CI pipeline complete
          color: 0x00ff00

      - name: Notify CI wave about success
        if: success()
        continue-on-error: true
        env:
          CI_PIPELINES_ALERT_URL: ${{ vars.CI_PIPELINES_ALERT_URL }}
          CI_PIPELINES_ALERT_SECRET: ${{ secrets.CI_PIPELINES_ALERT_SECRET }}
          CI_PIPELINES_ALERT_API_AUTH: ${{ secrets.CI_PIPELINES_ALERT_API_AUTH }}
          CI_PIPELINES_TARGET_ENV: ${{ github.event.inputs.environment }}
          CI_PIPELINES_STATUS: success
          CI_PIPELINES_TITLE: Seize-Lambda ${{ github.event.inputs.environment }} ${{ github.event.inputs.service }} DEPLOY CI pipeline complete
          CI_PIPELINES_ENVIRONMENT: ${{ github.event.inputs.environment }}
          CI_PIPELINES_SERVICE: ${{ github.event.inputs.service }}
          CI_RELEASE_NOTES_PROMPT_PATH: ops/release-notes/release-notes.prompt.md
          CI_RELEASE_PULL_REQUEST: ${{ github.event.inputs.release_pull_request }}
          CI_RELEASE_NOTE_PUBLISH: ${{ github.event.inputs.release_note_publish }}
          CI_RELEASE_GROUP_SERVICES: ${{ github.event.inputs.release_group_services }}
          CI_RELEASE_NOTE_GROUPS: ${{ github.event.inputs.release_note_groups }}
          CI_RELEASE_NOTE_OPT_OUT: ${{ github.event.inputs.release_note_opt_out }}
        run: node scripts/notify-ci-wave.mjs
