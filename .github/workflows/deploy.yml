            DROP_MEDIA_SANITIZE_IMAGES_VALUE="${DROP_MEDIA_SANITIZE_IMAGES_PROD:-false}"
            DROP_MEDIA_INGEST_BUCKET="$DROP_MEDIA_INGEST_S3_BUCKET_PROD"
            API_GATEWAY_WS_ENDPOINT="$API_GATEWAY_WS_ENDPOINT_PROD"
          else
            ATTACHMENTS_BUCKET="$ATTACHMENTS_INGEST_S3_BUCKET_STAGING"
            DROP_MEDIA_SANITIZE_IMAGES_VALUE="${DROP_MEDIA_SANITIZE_IMAGES_STAGING:-false}"
            DROP_MEDIA_INGEST_BUCKET="$DROP_MEDIA_INGEST_S3_BUCKET_STAGING"
            API_GATEWAY_WS_ENDPOINT="$API_GATEWAY_WS_ENDPOINT_STAGING"
          fi
          DROP_MEDIA_INGEST_REGION="$DROP_MEDIA_INGEST_S3_REGION"
          DROP_MEDIA_SANITIZER_QUEUE="$DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME"

          if [ -z "$ATTACHMENTS_BUCKET" ]; then
            echo "ATTACHMENTS_INGEST_S3_BUCKET is not configured for ${{ github.event.inputs.environment }}"
            exit 1
          fi

          if [ -z "$API_GATEWAY_WS_ENDPOINT" ]; then
            echo "API_GATEWAY_WS_ENDPOINT is not configured for ${{ github.event.inputs.environment }}"
            exit 1
          fi

          if [ "$DROP_MEDIA_SANITIZE_IMAGES_VALUE" != "true" ]; then
            DROP_MEDIA_SANITIZE_IMAGES_VALUE="false"
          fi

          if [ "$DROP_MEDIA_SANITIZE_IMAGES_VALUE" = "true" ]; then
            if [ -z "$DROP_MEDIA_INGEST_BUCKET" ]; then
              echo "DROP_MEDIA_INGEST_S3_BUCKET is not configured for ${{ github.event.inputs.environment }}"
              exit 1
            fi
            if [ -z "$DROP_MEDIA_INGEST_REGION" ]; then
              echo "DROP_MEDIA_INGEST_S3_REGION is not configured"
              exit 1
            fi
            if [ -z "$DROP_MEDIA_SANITIZER_QUEUE" ]; then
              echo "DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME is not configured"
              exit 1
            fi
          fi

          {
            echo "ATTACHMENTS_INGEST_S3_BUCKET=$ATTACHMENTS_BUCKET"
            echo "DROP_MEDIA_SANITIZE_IMAGES=$DROP_MEDIA_SANITIZE_IMAGES_VALUE"
            echo "DROP_MEDIA_INGEST_S3_BUCKET=$DROP_MEDIA_INGEST_BUCKET"
            echo "DROP_MEDIA_INGEST_S3_REGION=$DROP_MEDIA_INGEST_REGION"
            echo "DROP_MEDIA_INGEST_STAGE=${{ github.event.inputs.environment }}"
            echo "DROP_MEDIA_SANITIZER_SQS_QUEUE_NAME=$DROP_MEDIA_SANITIZER_QUEUE"
            echo "API_GATEWAY_WS_ENDPOINT=$API_GATEWAY_WS_ENDPOINT"
          } >> "$GITHUB_ENV"
      - name: Verify production Lambda secret exists
        if: github.event.inputs.environment == 'prod' && (github.event.inputs.service == 'api' || github.event.inputs.service == 'releaseBus')
        shell: bash
        run: |
          set -euo pipefail
          if ! aws secretsmanager describe-secret --secret-id prod/lambdas --no-cli-pager > /dev/null; then
            echo "::error::Required shared secret prod/lambdas does not exist in us-east-1"
            exit 1
          fi
      - name: Store Release Bus GitHub App private key
        if: github.event.inputs.service == 'releaseBus'
        shell: bash
        env:
          RELEASE_BUS_GITHUB_PRIVATE_KEY: ${{ secrets.RELEASE_BUS_GITHUB_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          set +x
          umask 077
          current_secret=/tmp/release-bus-current-secret.json
          updated_secret=/tmp/release-bus-updated-secret.json
          trap 'rm -f "$current_secret" "$updated_secret"' EXIT
          aws secretsmanager get-secret-value             --secret-id prod/lambdas             --query SecretString             --output text > "$current_secret"
          if ! jq -e 'type == "object"' "$current_secret" > /dev/null; then
            echo "::error::Shared secret prod/lambdas must contain a JSON object"
            exit 1
          fi
          jq --arg privateKey "$RELEASE_BUS_GITHUB_PRIVATE_KEY"             '. + {RELEASE_BUS_GITHUB_PRIVATE_KEY: $privateKey}'             "$current_secret" > "$updated_secret"
          aws secretsmanager put-secret-value             --secret-id prod/lambdas             --secret-string "file://$updated_secret"             --no-cli-pager > /dev/null
      - name: Store Release Bus production API credentials
        if: github.event.inputs.service == 'api' && github.event.inputs.environment == 'prod'
        shell: bash
        env:
          RELEASE_BUS_GITHUB_WEBHOOK_SECRET: ${{ secrets.RELEASE_BUS_GITHUB_WEBHOOK_SECRET }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          set +x
          umask 077
          current_secret=/tmp/release-bus-current-secret.json
          updated_secret=/tmp/release-bus-updated-secret.json
          trap 'rm -f "$current_secret" "$updated_secret"' EXIT
          aws secretsmanager get-secret-value             --secret-id prod/lambdas             --query SecretString             --output text > "$current_secret"
          if ! jq -e 'type == "object"' "$current_secret" > /dev/null; then
            echo "::error::Shared secret prod/lambdas must contain a JSON object"
            exit 1
          fi
          jq             --arg webhookSecret "$RELEASE_BUS_GITHUB_WEBHOOK_SECRET"             --arg workflowToken "$RELEASE_BUS_WORKFLOW_AUTH_TOKEN"             '. + {RELEASE_BUS_GITHUB_WEBHOOK_SECRET: $webhookSecret, RELEASE_BUS_WORKFLOW_AUTH_TOKEN: $workflowToken}'             "$current_secret" > "$updated_secret"
          aws secretsmanager put-secret-value             --secret-id prod/lambdas             --secret-string "file://$updated_secret"             --no-cli-pager > /dev/null
      - name: Deploy service
        if: github.event.inputs.service != 'api' && github.event.inputs.service != 'nextgenMediaProxyInterceptor' && github.event.inputs.service != 'mediaResizerLoop' && github.event.inputs.service != 'releaseBus'
        run: |
          VERSION_DESCRIPTION="$(git rev-parse --short HEAD) - $(date) - $(git rev-parse --abbrev-ref HEAD) - $(git show -s --format=%s)"
          export VERSION_DESCRIPTION
          pushd src/${{ github.event.inputs.service }} && npm run sls-deploy:${{ github.event.inputs.environment }} && popd
      - name: Deploy Release Bus with runtime credentials
        if: github.event.inputs.service == 'releaseBus'
        env:
          RELEASE_BUS_GITHUB_APP_ID: ${{ vars.RELEASE_BUS_GITHUB_APP_ID }}
          RELEASE_BUS_GITHUB_INSTALLATION_ID: ${{ steps.release_bus_app.outputs.installation-id }}
