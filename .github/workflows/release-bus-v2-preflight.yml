name: Release Bus v2 - Preflight Backend

on:
  workflow_dispatch:
    inputs:
      release_train_id: { type: string, required: true }
      release_train_revision: { type: string, required: true }
      operation_key: { type: string, required: true }
      source_ref: { type: string, required: true }
      expected_sha: { type: string, required: true }
      deploy_units: { type: string, required: true }
      reuse_artifact_run_id: { type: string, required: false, default: '' }
      reuse_artifact_name: { type: string, required: false, default: '' }
      reuse_artifact_digest: { type: string, required: false, default: '' }

permissions:
  actions: read
  contents: read

run-name: Preflight backend v2 train ${{ inputs.release_train_id }} [${{ inputs.operation_key }}]

jobs:
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      unit_matrix: ${{ steps.validate.outputs.unit_matrix }}
    steps:
      - name: Check out exact composed SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.expected_sha }}
          persist-credentials: false
      - name: Validate exact inputs
        id: validate
        env:
          DEPLOY_UNITS: ${{ inputs.deploy_units }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          REUSE_ARTIFACT_DIGEST: ${{ inputs.reuse_artifact_digest }}
          REUSE_ARTIFACT_NAME: ${{ inputs.reuse_artifact_name }}
          REUSE_ARTIFACT_RUN_ID: ${{ inputs.reuse_artifact_run_id }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[a-f0-9]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          [[ "$TRAIN_ID" =~ ^[A-Za-z0-9._-]{1,100}$ ]]
          [[ "$OPERATION_KEY" =~ ^rb2:[A-Za-z0-9:._-]+:a[1-9][0-9]*$ ]]
          jq -e 'type == "array" and length > 0 and length == (unique | length) and all(.[]; test("^[A-Za-z0-9_-]+$"))' <<< "$DEPLOY_UNITS"
          if [ -n "$REUSE_ARTIFACT_RUN_ID" ]; then
            [[ "$REUSE_ARTIFACT_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
            [[ "$REUSE_ARTIFACT_NAME" =~ ^release-bus-v2-pr-[a-f0-9]{40}$ ]]
            [[ "$REUSE_ARTIFACT_DIGEST" =~ ^[a-f0-9]{64}$ ]]
          else
            test -z "$REUSE_ARTIFACT_NAME"
            test -z "$REUSE_ARTIFACT_DIGEST"
          fi
          echo "unit_matrix=$(jq -c '{unit:.}' <<< "$DEPLOY_UNITS")" >> "$GITHUB_OUTPUT"
      - name: Authorize exact v2 operation
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg expected_sha "$EXPECTED_SHA" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,artifact_run_id:null,repository:"backend",environment:"orchestration",service:null,expected_sha:$expected_sha,artifact_digest:null}')"
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" \
            -H 'Content-Type: application/json' --data "$payload" \
            "$RELEASE_BUS_API_URL/deploy/release-bus-v2/authorize"

  reuse:
    if: inputs.reuse_artifact_run_id != ''
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Bind exact green PR artifact identity
        id: identity
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REUSE_ARTIFACT_DIGEST: ${{ inputs.reuse_artifact_digest }}
          REUSE_ARTIFACT_NAME: ${{ inputs.reuse_artifact_name }}
          REUSE_ARTIFACT_RUN_ID: ${{ inputs.reuse_artifact_run_id }}
        run: |
          set -euo pipefail
          response="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$REUSE_ARTIFACT_RUN_ID/artifacts?name=$REUSE_ARTIFACT_NAME")"
          artifact="$(jq -c --arg name "$REUSE_ARTIFACT_NAME" '.artifacts | map(select(.expired == false and .name == $name))' <<< "$response")"
          test "$(jq 'length' <<< "$artifact")" -eq 1
          test "$(jq -r '.[0].digest | sub("^sha256:"; "")' <<< "$artifact")" = "$REUSE_ARTIFACT_DIGEST"
      - name: Download exact green PR artifact
        id: download
        if: steps.identity.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.reuse_artifact_run_id }}
          name: ${{ inputs.reuse_artifact_name }}
          path: release-bus-artifact
      - name: Verify and bind exact artifact without rebuilding
        id: verify
        if: steps.download.outcome == 'success'
        continue-on-error: true
        env:
          DEPLOY_UNITS: ${{ inputs.deploy_units }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          cd release-bus-artifact
          jq -e --arg source_sha "$EXPECTED_SHA" '.source_sha == $source_sha and .repository == "backend"' manifest.json >/dev/null
          sha256sum -c SHA256SUMS
          while IFS= read -r unit; do test -f "packages/$unit/index.zip"; done < <(jq -r '.[]' <<< "$DEPLOY_UNITS")
          jq --arg train_id "$TRAIN_ID" --argjson units "$DEPLOY_UNITS" '. + {train_id:$train_id,units:$units,reused_exact_pr_artifact:true}' manifest.json > manifest.next.json
          mv manifest.next.json manifest.json
          find packages -type f -name index.zip -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum manifest.json >> SHA256SUMS
      - name: Upload train-bound immutable artifact
        id: upload
        if: steps.verify.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-backend-${{ inputs.release_train_id }}-r${{ inputs.release_train_revision }}
          path: release-bus-artifact
          if-no-files-found: error
          retention-days: 30
      - name: Report exact reuse result
        if: always()
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
          IDENTITY_OUTCOME: ${{ steps.identity.outcome }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          if [ "$IDENTITY_OUTCOME" = success ] && [ "$DOWNLOAD_OUTCOME" = success ] && [ "$VERIFY_OUTCOME" = success ] && [ "$UPLOAD_OUTCOME" = success ]; then
            status=SUCCEEDED; failure_class=null; retryable=false
            digest="$(sha256sum release-bus-artifact/SHA256SUMS | cut -d' ' -f1)"
          elif [ "$IDENTITY_OUTCOME" != success ]; then
            status=FAILED; failure_class=CONTROL_PLANE; retryable=false; digest=''
          elif [ "$DOWNLOAD_OUTCOME" != success ] || [ "$UPLOAD_OUTCOME" != success ]; then
            status=FAILED; failure_class=INFRASTRUCTURE; retryable=true; digest=''
          else
            status=FAILED; failure_class=CONTROL_PLANE; retryable=false; digest=''
          fi
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg status "$status" --arg failure_class "$failure_class" --argjson retryable "$retryable" --arg digest "$digest" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,phase:"complete",status:$status,failure_class:(if $failure_class == "null" then null else $failure_class end),failure_phase:(if $status == "FAILED" then "artifact_reuse" else null end),retryable:$retryable,summary:{artifact_digest:(if $digest == "" then null else $digest end),fresh_or_reused:"reused"},stages:[],jest:null,backend_evidence:null}')"
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" -H 'Content-Type: application/json' --data "$payload" "$RELEASE_BUS_API_URL/deploy/release-bus-v2/report-progress"
      - name: Return authoritative reuse result
        if: always()
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
          IDENTITY_OUTCOME: ${{ steps.identity.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: test "$IDENTITY_OUTCOME" = success -a "$DOWNLOAD_OUTCOME" = success -a "$VERIFY_OUTCOME" = success -a "$UPLOAD_OUTCOME" = success

  quality:
    if: inputs.reuse_artifact_run_id == ''
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        shard: [lint, typecheck, inventory, tests-1, tests-2, tests-3, tests-4]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact composed SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.expected_sha }}
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install frozen root dependencies
        run: npm ci
      - name: Run shard
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          case "$SHARD" in
            lint) ./node_modules/.bin/eslint "src/**/*.ts" --max-warnings=0 ;;
            typecheck)
              npm --prefix src/api-serverless ci --ignore-scripts
              ./node_modules/.bin/tsc -p tsconfig.json --pretty false
              ;;
            inventory)
              mkdir -p release-bus-test-inventory
              NODE_ENV=test ./node_modules/.bin/jest --listTests \
                | sort -u > release-bus-test-inventory/complete.txt
              test -s release-bus-test-inventory/complete.txt
              ;;
            tests-*)
              shard_index="${SHARD#tests-}"
              [[ "$shard_index" =~ ^[1-4]$ ]]
              mkdir -p release-bus-test-inventory
              NODE_ENV=test ./node_modules/.bin/jest --listTests \
                --shard="$shard_index/4" \
                | sort -u > "release-bus-test-inventory/shard-$shard_index.txt"
              test -s "release-bus-test-inventory/shard-$shard_index.txt"
              NODE_ENV=test ./node_modules/.bin/jest --maxWorkers=2 \
                --shard="$shard_index/4"
              ;;
          esac
          test -z "$(git status --porcelain --untracked-files=no)"
      - name: Upload exact Jest inventory evidence
        if: matrix.shard == 'inventory' || startsWith(matrix.shard, 'tests-')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-v2-backend-test-inventory-${{ github.run_id }}-${{ matrix.shard }}
          path: release-bus-test-inventory
          if-no-files-found: error
          retention-days: 7

  package:
    if: inputs.reuse_artifact_run_id == ''
    needs: authorize
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.authorize.outputs.unit_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact composed SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.expected_sha }}
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: '22', cache: npm, cache-dependency-path: package-lock.json }
      - name: Build selected unit exactly once
        env:
          UNIT: ${{ matrix.unit }}
        run: |
          set -euo pipefail
          npm ci
          package_dir="src/$UNIT"
          if [ "$UNIT" = api ]; then package_dir=src/api-serverless; fi
          npm --prefix "$package_dir" ci --ignore-scripts
          npm --prefix "$package_dir" run build
          mkdir -p "release-bus-unit/packages/$UNIT"
          cp "$package_dir/dist/index.zip" "release-bus-unit/packages/$UNIT/index.zip"
      - name: Upload exact unit package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-v2-backend-unit-${{ matrix.unit }}-${{ github.run_id }}
          path: release-bus-unit
          if-no-files-found: error
          retention-days: 7

  aggregate:
    if: always() && inputs.reuse_artifact_run_id == '' && needs.authorize.result == 'success'
    needs: [authorize, quality, package]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download exact Jest inventory evidence
        id: inventory_download
        if: needs.quality.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: release-bus-v2-backend-test-inventory-${{ github.run_id }}-*
          merge-multiple: true
          path: release-bus-test-inventory
      - name: Prove sharded Jest inventory is exact
        id: inventory_verify
        if: steps.inventory_download.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          test -s release-bus-test-inventory/complete.txt
          for shard in 1 2 3 4; do
            test -s "release-bus-test-inventory/shard-$shard.txt"
          done
          sort release-bus-test-inventory/complete.txt > complete.sorted
          cat release-bus-test-inventory/shard-*.txt | sort > shards.sorted
          test -z "$(uniq -d shards.sorted)"
          test "$(wc -l < shards.sorted)" -eq "$(wc -l < complete.sorted)"
          diff -u complete.sorted shards.sorted
      - name: Download exact unit packages
        id: download
        if: needs.package.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: release-bus-v2-backend-unit-*-${{ github.run_id }}
          merge-multiple: true
          path: release-bus-artifact
      - name: Build compact immutable manifest
        id: bind
        if: needs.quality.result == 'success' && needs.package.result == 'success' && steps.download.outcome == 'success'
        continue-on-error: true
        env:
          DEPLOY_UNITS: ${{ inputs.deploy_units }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          TRAIN_ID: ${{ inputs.release_train_id }}
        run: |
          set -euo pipefail
          while IFS= read -r unit; do test -f "release-bus-artifact/packages/$unit/index.zip"; done < <(jq -r '.[]' <<< "$DEPLOY_UNITS")
          jq -n --arg train_id "$TRAIN_ID" --arg source_sha "$EXPECTED_SHA" --argjson units "$DEPLOY_UNITS" '{schema_version:2,repository:"backend",train_id:$train_id,source_sha:$source_sha,units:$units,reused_exact_pr_artifact:false}' > release-bus-artifact/manifest.json
          cd release-bus-artifact
          find packages -type f -name index.zip -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum manifest.json >> SHA256SUMS
      - name: Upload one exact backend artifact
        id: upload
        if: needs.quality.result == 'success' && needs.package.result == 'success' && steps.inventory_verify.outcome == 'success' && steps.bind.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bus-backend-${{ inputs.release_train_id }}-r${{ inputs.release_train_revision }}
          path: release-bus-artifact
          if-no-files-found: error
          retention-days: 30
      - name: Report structured terminal result
        if: always()
        env:
          BIND_OUTCOME: ${{ steps.bind.outcome }}
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
          INVENTORY_DOWNLOAD_OUTCOME: ${{ steps.inventory_download.outcome }}
          INVENTORY_VERIFY_OUTCOME: ${{ steps.inventory_verify.outcome }}
          OPERATION_KEY: ${{ inputs.operation_key }}
          PACKAGE_RESULT: ${{ needs.package.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          RELEASE_BUS_API_URL: ${{ vars.RELEASE_BUS_API_URL }}
          RELEASE_BUS_WORKFLOW_AUTH_TOKEN: ${{ secrets.RELEASE_BUS_WORKFLOW_AUTH_TOKEN }}
          TRAIN_ID: ${{ inputs.release_train_id }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
        run: |
          set -euo pipefail
          if [ "$QUALITY_RESULT" = success ] && [ "$PACKAGE_RESULT" = success ] && [ "$INVENTORY_DOWNLOAD_OUTCOME" = success ] && [ "$INVENTORY_VERIFY_OUTCOME" = success ] && [ "$DOWNLOAD_OUTCOME" = success ] && [ "$BIND_OUTCOME" = success ] && [ "$UPLOAD_OUTCOME" = success ]; then
            status=SUCCEEDED
            failure_class=null
            retryable=false
            digest="$(sha256sum release-bus-artifact/SHA256SUMS | cut -d' ' -f1)"
          elif [ "$INVENTORY_VERIFY_OUTCOME" = failure ]; then
            status=FAILED
            failure_class=CONTROL_PLANE
            retryable=false
            digest=''
          elif [ "$INVENTORY_DOWNLOAD_OUTCOME" = failure ] || [ "$DOWNLOAD_OUTCOME" = failure ] || [ "$BIND_OUTCOME" = failure ] || [ "$UPLOAD_OUTCOME" = failure ]; then
            status=FAILED
            failure_class=INFRASTRUCTURE
            retryable=true
            digest=''
          else
            status=FAILED
            failure_class=CANDIDATE
            retryable=false
            digest=''
          fi
          payload="$(jq -n --arg train_id "$TRAIN_ID" --arg operation_key "$OPERATION_KEY" --arg workflow_run_id "$GITHUB_RUN_ID" --arg status "$status" --arg failure_class "$failure_class" --argjson retryable "$retryable" --arg digest "$digest" '{train_id:$train_id,operation_key:$operation_key,workflow_run_id:$workflow_run_id,phase:"complete",status:$status,failure_class:(if $failure_class == "null" then null else $failure_class end),failure_phase:(if $status == "FAILED" then "combined_preflight" else null end),retryable:$retryable,summary:{artifact_digest:(if $digest == "" then null else $digest end),fresh_or_reused:"fresh"},stages:[],jest:null,backend_evidence:null}')"
          curl --fail-with-body --silent --show-error -H "Authorization: Bearer $RELEASE_BUS_WORKFLOW_AUTH_TOKEN" -H 'Content-Type: application/json' --data "$payload" "$RELEASE_BUS_API_URL/deploy/release-bus-v2/report-progress"
      - name: Return authoritative preflight result
        if: always()
        env:
          BIND_OUTCOME: ${{ steps.bind.outcome }}
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
          INVENTORY_DOWNLOAD_OUTCOME: ${{ steps.inventory_download.outcome }}
          INVENTORY_VERIFY_OUTCOME: ${{ steps.inventory_verify.outcome }}
          PACKAGE_RESULT: ${{ needs.package.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
        run: test "$QUALITY_RESULT" = success -a "$PACKAGE_RESULT" = success -a "$INVENTORY_DOWNLOAD_OUTCOME" = success -a "$INVENTORY_VERIFY_OUTCOME" = success -a "$DOWNLOAD_OUTCOME" = success -a "$BIND_OUTCOME" = success -a "$UPLOAD_OUTCOME" = success
