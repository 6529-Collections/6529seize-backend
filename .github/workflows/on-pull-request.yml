name: Build backend and API on pull request

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build backend and API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Check package manager discipline
        run: node scripts/check-package-manager.mjs
      - name: Activate pinned npm via Corepack
        shell: bash
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          expected="$(node -p "String(require('./package.json').packageManager ?? '').split('npm@')[1] ?? ''")"
          if [[ -z "${expected}" ]]; then
            echo "::error::package.json has no npm packageManager pin; the discipline check should have caught this."
            exit 1
          fi
          corepack enable npm
          corepack install
          resolved="$(npm --version)"
          echo "npm resolved to ${resolved} (pinned ${expected})"
          if [[ "${resolved}" != "${expected}" ]]; then
            echo "::error::Corepack did not activate the pinned npm (expected ${expected}, got ${resolved})."
            exit 1
          fi
      - name: Install dependencies
        run: npm i && pushd src/api-serverless && npm i && popd
      - name: Verify generated files are committed
        run: |
          npm run generate:deploy-config
          if [[ -n "$(git status --porcelain -- .github/workflows/deploy.yml)" ]]; then
            echo "::error::.github/workflows/deploy.yml is generated. Edit config/deploy-services.json, rerun npm run generate:deploy-config, and commit the result."
            git diff --stat -- .github/workflows/deploy.yml
            exit 1
          fi

          pushd src/api-serverless
          npm run generate
          popd

          if [[ -n "$(git status --porcelain -- src/api-serverless/src/generated)" ]]; then
            echo "::error::src/api-serverless/src/generated is generated from openapi.yaml. Rerun src/api-serverless generation and commit the result."
            git diff --stat -- src/api-serverless/src/generated
            exit 1
          fi
      - name: Lint
        run: |
          npm run lint -- --max-warnings=0
          if ! git diff --exit-code -- 'src/**/*.ts'; then
            echo "::error::Lint --fix changed source files. Commit the fixes."
            git diff --stat -- 'src/**/*.ts'
            exit 1
          fi
      - name: Format
        run: |
          npm run format
          if ! git diff --exit-code -- 'src/**/*.ts'; then
            echo "::error::Format changed source files. Run 'npm run format' and commit."
            git diff --stat -- 'src/**/*.ts'
            exit 1
          fi
      - name: Build backend
        run: npm run build
      - name: Build API
        run: pushd src/api-serverless && npm run build && popd
