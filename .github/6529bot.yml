version: 1
enabled: true

reviewKinds:
  allowed: [general, followup, wcag, i18n, security, deploy-actions, auth-api, db-lambda, media-external, glm-swarm]
  initial: [general, security, deploy-actions, auth-api, db-lambda, media-external, glm-swarm]
  followup: [followup]

commands:
  enabled: true

lanes:
  - provider: anthropic
    model: claude-opus-4-8

limits:
  maxJobsPerDelivery: 7

admission:
  publicRepoMode: trusted
  privateRepoMode: open
  draftPrMode: allow
  trustedPermission: write
  trustedUsers: []
  trustedTeams: []
  trustedOrganizations: []
  denyUsers: []

budget:
  mode: enforce
  defaultEstimatedCostUsd: 1
  caps:
    repo:
      dailyUsd: 150
      weeklyUsd: 1050
      monthlyUsd: 4500
    requestor:
      dailyUsd: 1000
      weeklyUsd: 7000
      monthlyUsd: 30000
    pr:
      dailyUsd: 100
      weeklyUsd: 700
      monthlyUsd: 3000
    review_kind:
      dailyUsd: 1000
      weeklyUsd: 7000
      monthlyUsd: 30000
