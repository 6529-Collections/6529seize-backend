service: s3Uploader

frameworkVersion: '4'

package:
  artifact: dist/index.zip

plugins:
  - serverless-offline

provider:
  name: aws
  runtime: nodejs22.x
  memorySize: 5120
  timeout: 900
  logRetentionInDays: 60

functions:
  s3Uploader:
    handler: index.handler
    name: s3Uploader
    description: ${env:VERSION_DESCRIPTION}
    role: arn:aws:iam::987989283142:role/lambda-vpc-role
    reservedConcurrency: 2
    events:
      - sqs:
          arn:
            Fn::GetAtt: [S3UploaderQueue, Arn]
          batchSize: 1
          functionResponseType: ReportBatchItemFailures
    vpc:
      securityGroupIds: ${file(../../serverless-config/${opt:stage, self:provider.stage}/vpc.js):security}
      subnetIds: ${file(../../serverless-config/${opt:stage, self:provider.stage}/vpc.js):subnets}
    environment:
      SENTRY_DSN: ${env:SENTRY_DSN}
      SENTRY_ENVIRONMENT: 's3Uploader_${opt:stage, self:provider.stage}'

resources:
  Resources:
    S3UploaderQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: s3-uploader-jobs
        VisibilityTimeout: 1000
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [S3UploaderDLQ, Arn]
          maxReceiveCount: 10

    S3UploaderDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: s3-uploader-jobs-dlq

    S3UploaderLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/s3Uploader
        RetentionInDays: 60

    S3UploaderOOMFilter:
      Type: AWS::Logs::MetricFilter
      DependsOn:
        - S3UploaderLogGroup
      Properties:
        LogGroupName:
          Ref: S3UploaderLogGroup
        FilterPattern: "Runtime.OutOfMemory"
        MetricTransformations:
          - MetricNamespace: "Lambda/OOM"
            MetricName: "s3Uploader_OOMErrorCount"
            MetricValue: "1"
            DefaultValue: 0

    S3UploaderOOMAlarm:
      Type: AWS::CloudWatch::Alarm
      DependsOn: S3UploaderOOMFilter
      Properties:
        AlarmName: !Sub "${AWS::StackName}-s3Uploader-OOM"
        AlarmDescription: !Sub "Lambda s3Uploader OutOfMemory in ${AWS::Region}"
        Namespace: "Lambda/OOM"
        MetricName: "s3Uploader_OOMErrorCount"
        Statistic: Sum
        Period: 60
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - ${file(../../serverless-config/${opt:stage, self:provider.stage}/vpc.js):cwtopic}
        OKActions:
          - ${file(../../serverless-config/${opt:stage, self:provider.stage}/vpc.js):cwtopic}
