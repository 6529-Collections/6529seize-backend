service: releaseBus

package:
  artifact: dist/index.zip

provider:
  name: aws
  runtime: nodejs22.x
  memorySize: 1024
  timeout: 60
  architecture: arm64
  logRetentionInDays: 60
  environment:
    RELEASE_BUS_GITHUB_APP_ID: ${env:RELEASE_BUS_GITHUB_APP_ID}
    RELEASE_BUS_GITHUB_INSTALLATION_ID: ${env:RELEASE_BUS_GITHUB_INSTALLATION_ID}
    RELEASE_BUS_GITHUB_ORG: ${env:RELEASE_BUS_GITHUB_ORG, '6529-Collections'}
    RELEASE_BUS_UI_URL: ${env:RELEASE_BUS_UI_URL, 'https://api.6529.io/deploy/ui/bus'}

functions:
  v2Reconciler:
    handler: index.v2ReconcilerHandler
    name: releaseBusV2Reconciler
    reservedConcurrency: 1
    timeout: 60
    role: arn:aws:iam::987989283142:role/lambda-vpc-role
    vpc:
      securityGroupIds: ${file(../../serverless-config/${opt:stage, self:provider.stage}/vpc.js):security}
      subnetIds: ${file(../../serverless-config/${opt:stage, self:provider.stage}/vpc.js):subnets}
    events:
      - schedule: rate(1 minute)
    environment:
      RELEASE_BUS_V2_MODE: ${env:RELEASE_BUS_V2_MODE, 'OFF'}
      RELEASE_BUS_V2_BETA_ALLOWLIST: ${env:RELEASE_BUS_V2_BETA_ALLOWLIST, ''}
      SENTRY_DSN: ${env:SENTRY_DSN}
  cleaner:
    handler: index.cleanerHandler
    name: releaseBusCleaner
    reservedConcurrency: 1
    role: arn:aws:iam::987989283142:role/lambda-vpc-role
    vpc:
      securityGroupIds: ${file(../../serverless-config/${opt:stage, self:provider.stage}/vpc.js):security}
      subnetIds: ${file(../../serverless-config/${opt:stage, self:provider.stage}/vpc.js):subnets}
    events:
      - schedule: rate(1 day)
    environment:
      RELEASE_BUS_V2_BRANCH_RETENTION_DAYS: ${env:RELEASE_BUS_V2_BRANCH_RETENTION_DAYS, '7'}
      SENTRY_DSN: ${env:SENTRY_DSN}

resources:
  Resources:
    ReleaseBusV2ReconcilerInvokePolicy:
      Type: AWS::IAM::Policy
      Properties:
        PolicyName: !Sub '${AWS::StackName}-invoke-v2-reconciler'
        Roles:
          - lambda-vpc-role
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt V2ReconcilerLambdaFunction.Arn
                - !Join [':', [!GetAtt V2ReconcilerLambdaFunction.Arn, '*']]
    ReleaseBusV2ReconcilerErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmDescription: Release Bus v2 reconciler invocation failed
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: releaseBusV2Reconciler
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
    ReleaseBusV2CleanerErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmDescription: Release Bus v2 branch cleaner invocation failed
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: releaseBusCleaner
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
